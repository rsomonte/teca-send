services:
  teca-send:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teca-send
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - KINDLE_MOUNT_POINT=${CONTAINER_KINDLE_MOUNT_POINT:-/kindle}
      - KINDLE_DOCUMENTS_FOLDER=${KINDLE_DOCUMENTS_FOLDER:-documents}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Bind host Kindle mount path into the container mount path.
      - ${KINDLE_MOUNT_POINT:-/mnt/kindle}:${CONTAINER_KINDLE_MOUNT_POINT:-/kindle}:${KINDLE_MOUNT_OPTIONS:-rw,z}
      # Store converted files
      - teca-converted:/tmp/converted
    restart: unless-stopped
    security_opt:
      - ${CONTAINER_SECURITY_OPT:-label=disable}
    networks:
      - teca-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  teca-converted:
    driver: local

networks:
  teca-network:
    driver: bridge
