services:
  teca-send:
    image: ${DOCKER_IMAGE:-teca-send:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teca-send
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - KINDLE_MOUNT_POINT=${CONTAINER_KINDLE_MOUNT_POINT:-/kindle}
      - KINDLE_DOCUMENTS_FOLDER=${KINDLE_DOCUMENTS_FOLDER:-documents}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Bind host Kindle mount path into the container mount path.
      - type: bind
        source: ${KINDLE_MOUNT_POINT:-/mnt/kindle}
        target: ${CONTAINER_KINDLE_MOUNT_POINT:-/kindle}
        bind:
          propagation: ${KINDLE_BIND_PROPAGATION:-rshared}
      # Store converted files
      - teca-converted:/tmp/converted
    restart: unless-stopped
    security_opt:
      - ${CONTAINER_SECURITY_OPT:-label=disable}
    networks:
      - teca-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  teca-converted:
    driver: local

networks:
  teca-network:
    driver: bridge
