name: Fetch latest image on server

on:
  workflow_run:
    workflows:
      - "Build and Publish Docker Image"
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Verify SSH key loaded
        run: |
          ssh-add -l

      - name: Deploy via SSH and Docker Compose
        env:
          DEPLOY_HOST: ${{ secrets.SERVER_DNS_NAME }}
          DEPLOY_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR || format('/home/{0}/teca-send', secrets.SERVER_USER) }}

        run: |
          # Resolve DNS
          DEPLOY_HOST_IP=$(dig +short "${DEPLOY_HOST}" | tail -n1)

          if [ -z "$DEPLOY_HOST_IP" ]; then
            echo "Error: Could not resolve IP for DNS"
            exit 1
          fi

          echo "::add-mask::$DEPLOY_HOST_IP"

          echo "Resolved DNS IP"
          echo "Starting deployment to server..."

          # Connectivity test
          ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p "$SERVER_SSH_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST_IP" \
            "echo 'SSH OK'" || exit 1

          # Deployment
          ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p "$SERVER_SSH_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST_IP" << EOF

          set -e

          cd "$DEPLOY_DIR" || exit 1

          echo "Running: docker compose pull"
          docker compose pull

          echo "Running: docker compose up -d"
          docker compose up -d

          echo "Deployment complete."

          EOF
